name: Release

# Tetikleyiciler:
#   - tag push (v*)        → otomatik build + GitHub Releases'e yayınla
#   - workflow_dispatch    → manuel çalıştır (build alır ama publish etmez)
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # Release oluşturmak için gerekli

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint (best effort)
        run: npm run lint --if-present
        continue-on-error: true

      - name: Build & publish (tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Kod imzalama (opsiyonel — secret yoksa imzasız build):
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: npm run release:win

      - name: Build only (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        env:
          # Manuel dispatch'de imzalı build alabilmek için secret'lar yine aktif
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: npm run build:win

      - name: Upload artifacts (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: cnc-mes-terminal-${{ github.sha }}
          path: |
            dist/*.exe
            dist/*.yml
            dist/*.blockmap
          if-no-files-found: warn
          retention-days: 14
